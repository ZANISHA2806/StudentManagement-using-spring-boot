spring.application.name=studentmanagement
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/hb-01-one-to-one-uni
spring.datasource.username=root
spring.datasource.password=Rahamath@2005
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#turn of the springboot banner
spring.main.banner-mode=off

#reduce logging level.set logging level to warn and error so that it shows only the output and warning,error loggs not running logs
logging.level.root=warn

#show jpa/hibernate logging statement
#logs sql statement
logging.level.org.hibernate.SQL=trace 

#logs values passed for sql statement
logging.level.org.hibernate.orm.jdbc.bind=trace
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html